
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <!-- Primary Meta Tags -->
    <title>HaiFire - Ignite Your Story | Social Storytelling Platform</title>
    <meta name="title" content="HaiFire - Ignite Your Story | Social Storytelling Platform">
    <meta name="description" content="HaiFire is a high-energy social media platform for creators. Ignite your story with real-time interactions, visual storytelling, and seamless community engagement.">
    <meta name="keywords" content="social media, storytelling, creators, real-time chat, community, HaiFire, visual social, ignite story">
    <meta name="author" content="HaiFire Labs">
    <meta name="robots" content="index, follow">
    <meta name="theme-color" content="#050505">

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://haifire.social/">
    <meta property="og:title" content="HaiFire - Ignite Your Story">
    <meta property="og:description" content="The high-energy social platform for creators. Share your fire, connect with friends, and ignite your story.">
    <meta property="og:image" content="https://haifire.social/og-image.png">

    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image">
    <meta property="twitter:url" content="https://haifire.social/">
    <meta property="twitter:title" content="HaiFire - Ignite Your Story">
    <meta property="twitter:description" content="The high-energy social platform for creators. Share your fire, connect with friends, and ignite your story.">
    <meta property="twitter:image" content="https://haifire.social/og-image.png">

    <!-- Favicon -->
    <link rel="icon" type="image/png" href="favicon.png">
    <link rel="apple-touch-icon" href="favicon.png">

    <!-- Structured Data -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "SocialMediaPosting",
      "headline": "HaiFire - Ignite Your Story",
      "description": "A modern, high-energy social media platform designed for creators to ignite their stories.",
      "author": {
        "@type": "Organization",
        "name": "HaiFire Labs"
      },
      "image": "https://haifire.social/og-image.png",
      "publisher": {
        "@type": "Organization",
        "name": "HaiFire",
        "logo": {
          "@type": "ImageObject",
          "url": "https://haifire.social/favicon.png"
        }
      }
    }
    </script>

    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Roboto+Mono&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet">
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        primary: '#2563eb',
                        secondary: '#3b82f6',
                        dark: '#050505',
                        surface: '#121212',
                        border: '#222222'
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        mono: ['Roboto Mono', 'monospace']
                    }
                }
            }
        }
    </script>
    <style>
        body {
            background-color: #050505;
            background-image: 
                linear-gradient(rgba(37, 99, 235, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(37, 99, 235, 0.03) 1px, transparent 1px);
            background-size: 40px 40px;
            color: #ffffff;
            font-family: 'Inter', sans-serif;
            overflow-x: hidden;
        }
        .glass {
            background: rgba(18, 18, 18, 0.8);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }
        .fire-gradient {
            background: linear-gradient(135deg, #2563eb 0%, #1d4ed8 100%);
        }
        ::-webkit-scrollbar {
            width: 6px;
        }
        ::-webkit-scrollbar-track {
            background: #050505;
        }
        ::-webkit-scrollbar-thumb {
            background: #222222;
            border-radius: 10px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #2563eb;
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .fill-icon {
            font-variation-settings: 'FILL' 1;
        }
        .card-shadow {
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.5);
        }
    </style>
<script type="importmap">
{
  "imports": {
    "react/": "https://esm.sh/react@^19.2.3/",
    "react": "https://esm.sh/react@^19.2.3",
    "react-dom/": "https://esm.sh/react-dom@^19.2.3/",
    "react-router-dom": "https://esm.sh/react-router-dom@^7.11.0",
    "firebase/": "https://esm.sh/firebase@^12.7.0/"
  }
}
</script>
<link rel="stylesheet" href="/index.css">
</head>

</body>
</html>
